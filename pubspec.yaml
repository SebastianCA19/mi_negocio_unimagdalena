name: mi_negocio_unimagdalena
description: Aplicacion de registro de compras, ventas, inventario y finanzas para emprendedores de la Universidad del Magdalena.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Manejo de estado
  provider: ^6.1.1

  # Base de datos local
  sqflite: ^2.3.2
  path: ^1.9.0

  # Navegacion
  go_router: ^13.2.0

  # Imagenes (camara y galeria)
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # Generacion de PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Permisos
  permission_handler: ^11.3.0

  # Almacenamiento de archivos
  path_provider: ^2.1.2

  # Compartir archivos
  share_plus: ^7.2.2

  # Preferencias locales (sesion)
  shared_preferences: ^2.2.2

  # Formato de fechas
  intl: ^0.19.0

  # Iconos
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

